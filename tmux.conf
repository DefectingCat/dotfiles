# =============================================================================
# tmux 配置 - ~/.config/tmux/tmux.conf
# =============================================================================

# -----------------------------------------------------------------------------
# 基础设置
# -----------------------------------------------------------------------------

# 前缀键: Ctrl+b(保持默认)
set -g prefix C-b
unbind C-b
bind C-b send-prefix

# 真彩色支持
set -gs terminal-overrides ",*256col*:Tc"
set -g default-terminal "tmux-256color"

# 降低 Esc 延迟,改善 Vim/Neovim 体验
set -sg escape-time 0

# 提升重复按键响应
set -sg repeat-time 600

# 历史记录上限
set -g history-limit 50000

# 窗口/面板编号从 1 开始
set -g base-index 1
setw -g pane-base-index 1

# 关闭窗口后自动重排编号
set -g renumber-windows on

# 索引刷新(配合 base-index/renumber-windows)
set -g set-titles on
set -g set-titles-string "#S:#I:#W - \"#T\""

# 启用鼠标: 滚动/选 pane/调整分屏
set -g mouse on

# 系统剪贴板集成(macOS)
set -g set-clipboard on
if-shell "uname | grep -q Darwin" \
    'bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"'

# 自动重新加载配置
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded ✓"

# -----------------------------------------------------------------------------
# 状态栏美化
# -----------------------------------------------------------------------------

set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left

# 主题色板(Catppuccin Mocha)
# Base #1e1e2e  Mantle #181825  Crust #11111b  Surface0 #313244
# Text #cdd6f4  Subtext0 #a6adc8
# Mauve #cba6f7  Blue #89b4fa  Green #a6e3a1  Peach #fab387
# Yellow #f9e2af  Red #f38ba8  Teal #94e2d5  Sky #89dceb  Lavender #b4befe
set -g status-bg "#181825"      # Mantle
set -g status-fg "#cdd6f4"      # Text

# 左侧: 会话名(Mauve 块)
set -g status-left-length 40
set -g status-left "#[fg=#11111b,bg=#cba6f7,bold]  #S #[fg=#cba6f7,bg=#181825]"

# 右侧: 主机名(Green) + 时间(Peach)
set -g status-right-length 80
set -g status-right "#[fg=#a6e3a1,bold]#h #[fg=#11111b,bg=#fab387] %H:%M #[fg=#fab387,bg=#181825] %m-%d "

# 窗口标签样式
set -g window-status-format         "#[fg=#a6adc8] #I:#W "
set -g window-status-current-format "#[fg=#11111b,bg=#89b4fa,bold] #I:#W #[default]"
set -g window-status-separator      ""

# 消息样式
set -g message-style "fg=#11111b,bg=#cba6f7,bold"
set -g message-command-style "fg=#11111b,bg=#fab387"

# pane 边框
set -g pane-border-style "fg=#313244"           # Surface0(非活动)
set -g pane-active-border-style "fg=#cba6f7"    # Mauve(活动)
set -g pane-border-status off

# -----------------------------------------------------------------------------
# 分屏与导航
# -----------------------------------------------------------------------------

# 更直观的分屏键: | 竖切(左右分), - 横切(上下分)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 关闭当前 pane(直接关闭,不询问确认)
bind x kill-pane

# 新窗口/新 pane 都继承当前路径
bind c new-window -c "#{pane_current_path}"

# Vim 风格切 pane
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 调整 pane 大小(Prefix + H/J/K/L,可重复)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -----------------------------------------------------------------------------
# 复制模式(Vi 模式)
# -----------------------------------------------------------------------------

# 启用 vi 模式
setw -g mode-keys vi

# v 进入可视选择, V 行选择, y 复制
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# 矩形选择(Ctrl+v)
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Prefix + Ctrl+y 直接进入复制模式(进入后用 v/V/C-v 选择,y 复制)
bind C-y copy-mode

# Vi 风格翻页/搜索(与 tmux 3.6 默认 / ? 绑定一致,采用花括号模板)
bind -T copy-mode-vi / command-prompt -T search -p "(search down)" { send-keys -X search-forward -- "%%" }
bind -T copy-mode-vi ? command-prompt -T search -p "(search up)" { send-keys -X search-backward -- "%%" }
bind -T copy-mode-vi C-u send-keys -X halfpage-up
bind -T copy-mode-vi C-d send-keys -X halfpage-down

# -----------------------------------------------------------------------------
# 其它优化
# -----------------------------------------------------------------------------

# 活动监控
set -g monitor-activity on
set -g visual-activity off
set -g visual-bell on
set -g bell-action current

# 聚焦事件透传给终端应用
set -g focus-events on

# 终端支持粗体/斜体
set -as terminal-features ",*:RGB"

# 嵌套 tmux 时切换前缀(可选,Ctrl+a)
# bind-key -n C-a send-prefix

# 默认终端命令 shell,从 SHELL 环境变量取
set -g default-shell "${SHELL}"

# =============================================================================
